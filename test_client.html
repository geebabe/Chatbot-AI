<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Service - Test Client</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 2rem;
            box-sizing: border-box;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            height: 100%;
        }

        .control-panel, .chat-display {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h2 { margin-top: 0; color: var(--primary); font-size: 1.25rem; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: #94a3b8; }
        input, textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            padding: 0.75rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { background: #475569; cursor: not-allowed; }

        .message-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .msg { padding: 0.75rem; border-radius: 8px; max-width: 90%; }
        .msg.user { background: var(--primary); align-self: flex-end; }
        .msg.ai { background: #334155; align-self: flex-start; }

        .raw-log {
            font-family: monospace;
            font-size: 11px;
            color: #10b981;
            height: 150px;
            overflow-y: auto;
            background: black;
            padding: 0.5rem;
            border-radius: 4px;
        }

        .status { font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.5rem; }
    </style>
</head>
<body>

<div class="container">
    <!-- Left: Configuration & Send -->
    <div class="control-panel">
        <h2>Configuration</h2>
        <div class="form-group">
            <label>API Endpoint</label>
            <input type="text" id="endpoint" value="http://localhost:8000/api/v1/chat/stream">
        </div>
        <div class="form-group">
            <label>Session ID</label>
            <input type="text" id="sessionId" value="test-session-001">
        </div>
        <div class="form-group">
            <label>User ID</label>
            <input type="text" id="userId" value="user-alpha">
        </div>
        <div class="form-group" style="flex-grow: 1;">
            <label>Message</label>
            <textarea id="message" rows="5" placeholder="Type your message here...">Hello! Who are you?</textarea>
        </div>
        <button id="sendBtn">Send Message (SSE)</button>
        
        <h2 style="margin-top: 2rem;">Raw SSE Stream</h2>
        <div id="rawLog" class="raw-log">Ready...</div>
    </div>

    <!-- Right: Visual Chat -->
    <div class="chat-display">
        <h2>Chat Preview</h2>
        <div id="status" class="status">Idle</div>
        <div id="messageArea" class="message-area"></div>
        <button id="clearBtn" style="background: transparent; border: 1px solid var(--border); font-size: 0.75rem; padding: 0.4rem;">Clear History</button>
    </div>
</div>

<script>
    const sendBtn = document.getElementById('sendBtn');
    const messageArea = document.getElementById('messageArea');
    const rawLog = document.getElementById('rawLog');
    const status = document.getElementById('status');

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = text;
        messageArea.appendChild(div);
        messageArea.scrollTop = messageArea.scrollHeight;
        return div;
    }

    function logRaw(text) {
        const span = document.createElement('div');
        span.textContent = text;
        rawLog.appendChild(span);
        rawLog.scrollTop = rawLog.scrollHeight;
    }

    sendBtn.addEventListener('click', async () => {
        const msgText = document.getElementById('message').value;
        if (!msgText) return;

        sendBtn.disabled = true;
        status.textContent = "Connecting...";
        rawLog.innerHTML = "";
        
        appendMessage('user', msgText);
        const aiMsgDiv = appendMessage('ai', '');
        let fullResponse = "";

        try {
            const response = await fetch(document.getElementById('endpoint').value, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    session_id: document.getElementById('sessionId').value,
                    user_id: document.getElementById('userId').value,
                    message: msgText
                })
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            
            status.textContent = "Streaming...";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                logRaw(chunk);

                // Simple SSE parsing logic
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.replace('data: ', '').trim();
                        
                        // Handle heartbeat or [DONE]
                        if (dataStr === '[DONE]') {
                            status.textContent = "Finished";
                            continue;
                        }
                        
                        try {
                            const data = JSON.parse(dataStr);
                            if (data.event === 'text-delta' && data.text) {
                                fullResponse += data.text;
                                aiMsgDiv.textContent = fullResponse;
                            }
                        } catch (e) {
                            // Heartbeat or other non-json data
                        }
                    }
                }
            }
        } catch (err) {
            status.textContent = "Error: " + err.message;
            aiMsgDiv.textContent = "Failed to get response: " + err.message;
        } finally {
            sendBtn.disabled = false;
        }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
        messageArea.innerHTML = "";
        rawLog.innerHTML = "Cleared.";
    });
</script>

</body>
</html>
